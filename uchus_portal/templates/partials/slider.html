{% load static %}
<div id="courseCarousel" class="carousel slide carousel-fade course-slider mb-3" data-bs-ride="carousel" data-bs-interval="3000">
    <div class="carousel-indicators">
        <button type="button" data-bs-target="#courseCarousel" data-bs-slide-to="0" class="active" aria-label="Слайд 1"></button>
        <button type="button" data-bs-target="#courseCarousel" data-bs-slide-to="1" aria-label="Слайд 2"></button>
        <button type="button" data-bs-target="#courseCarousel" data-bs-slide-to="2" aria-label="Слайд 3"></button>
        <button type="button" data-bs-target="#courseCarousel" data-bs-slide-to="3" aria-label="Слайд 4"></button>
    </div>
    <div class="carousel-inner">
        <div class="carousel-item active">
            <img src="{% static 'img/slider/slide1.png' %}" class="d-block w-100 carousel-img" alt="Слайд 1">
        </div>
        <div class="carousel-item">
            <img src="{% static 'img/slider/slide2.png' %}" class="d-block w-100 carousel-img" alt="Слайд 2">
        </div>
        <div class="carousel-item">
            <img src="{% static 'img/slider/slide3.png' %}" class="d-block w-100 carousel-img" alt="Слайд 3">
        </div>
        <div class="carousel-item">
            <img src="{% static 'img/slider/slide4.png' %}" class="d-block w-100 carousel-img" alt="Слайд 4">
        </div>
    </div>
    <button class="carousel-control-prev" type="button" data-bs-target="#courseCarousel" data-bs-slide="prev">
        <span class="carousel-control-prev-icon"></span>
    </button>
    <button class="carousel-control-next" type="button" data-bs-target="#courseCarousel" data-bs-slide="next">
        <span class="carousel-control-next-icon"></span>
    </button>
</div>
