{% extends 'base.html' %}

{% block title %}Вход — Портал Учусь рф{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-12 col-md-8 col-lg-5">
        <div class="card shadow-sm border-0">
            <div class="card-body p-4">
                <h1 class="h4 text-center mb-1">Вход в систему</h1>
                <p class="text-muted text-center small mb-4">Введите логин и пароль</p>

                <form method="post" novalidate>
                    {% csrf_token %}
                    {% for field in form %}
                        <div class="mb-3">
                            <label class="form-label" for="{{ field.id_for_label }}">{{ field.label }}</label>
                            {{ field }}
                        </div>
                    {% endfor %}
                    <button type="submit" class="btn btn-primary w-100">Войти</button>
                </form>

                <p class="text-center mt-3 mb-0 small">
                    Ещё не зарегистрированы?
                    <a href="{% url 'register' %}" class="fw-semibold">Регистрация</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
