{% extends 'base.html' %}

{% block title %}Вход администратора{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-12 col-md-6 col-lg-5">
        <div class="card border shadow-sm">
            <div class="card-body p-4">
                <h1 class="h4 text-center">Панель администратора</h1>
                <p class="text-muted text-center small mb-4">Вход для администратора</p>
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">Логин</label>
                        <input type="text" name="username" class="form-control" required autocomplete="username">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Пароль</label>
                        <input type="password" name="password" class="form-control" required autocomplete="current-password">
                    </div>
                    <button type="submit" class="btn btn-warning w-100">Войти как админ</button>
                </form>
                <p class="text-center mt-3 mb-0 small">
                    <a href="{% url 'login' %}">Вернуться к входу пользователя</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
